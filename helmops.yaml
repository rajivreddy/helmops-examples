apiVersion: fleet.cattle.io/v1alpha1
kind: HelmOp
metadata:
  name: nginx
  namespace: fleet-default
spec:
  namespace: default
  helm:
    releaseName: nginx
    chart: nginx
    repo: https://rajivreddy.github.io/helmops-examples/
  targets:
  - name: k3s
    clusterName: "k3s"
    helm:
      values:
        replicaCount: 1
  - name: prom-agent
    clusterName: "prom-agent"
    helm:
      values:
        image:
          tag: "alpine3.23"
        replicaCount: 2
        service:
          type: NodePort